name: CI

on:
  pull_request:
  push:
    branches: [main]

# No cloud access needed for CI; everything runs against synthetic fixtures.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: merge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package + dev tools
        run: pip install -e '.[dev]'

      - name: Ruff (lint + naive-datetime DTZ gate)
        run: ruff check .

      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Build merge image
        # Plain `docker build` on merge/ — proves the container builds from the
        # pinned slim base with vdirsyncer. No push on PRs.
        run: docker build -t availcal:ci ./merge

      - name: Smoke-test container against fixtures
        run: |
          set -euo pipefail
          mkdir -p out
          docker run --rm \
            -v "$PWD/merge/tests/fixtures:/fx:ro" \
            -v "$PWD/out:/out" \
            -e AVAILCAL_SOURCES_TOML=/app/sources.toml \
            -e AVAILCAL_LOCAL_ICS_DIR=/fx \
            -e AVAILCAL_OUTPUT_DIR=/out \
            -e AVAILCAL_WINDOW_START=2026-01-01T00:00:00+00:00 \
            -e AVAILCAL_HORIZON_DAYS=365 \
            --user root \
            availcal:ci
          test -s out/merged/availability.ics
          echo "Emitted availability.ics ($(wc -c < out/merged/availability.ics) bytes)"
